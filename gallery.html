<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yaksha Dedeepya - Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #000, #3b0000);
      color: #FFD700;
    }

    header {
      text-align: center;
      padding: 25px;
    }

    header img {
      height: 90px;
      border-radius: 15px;
      box-shadow: 0 0 25px gold;
    }

    h1 {
      text-align: center;
      font-size: 2.5em;
      margin-top: 10px;
      text-shadow: 0 0 25px gold;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .photo {
      border: 1px solid gold;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
      transition: 0.3s;
    }

    .photo:hover {
      transform: scale(1.03);
      box-shadow: 0 0 30px gold;
    }

    .photo img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
    }

    footer {
      text-align: center;
      padding: 15px;
      border-top: 1px solid gold;
      background: rgba(255, 215, 0, 0.05);
      color: #FFD700;
    }

    @media (max-width: 600px) {
      .photo img { height: 180px; }
      h1 { font-size: 2em; }
    }
  </style>
</head>
<body>

  <header>
    <img src="logo123.jpeg" alt="Yaksha Dedeepya Logo">
  </header>

  <h1>Yaksha Dedeepya Gallery</h1>

  <section class="gallery">
    <div class="photo">
      <img src="download.jpg" alt="ಯಕ್ಷಗಾನ ವೇಷ ಭೂಷಣ">
    </div>
    <div class="photo">
      <img src="ranga.jpg" alt="ರಂಗಸ್ಥಳ">
    </div>
    <div class="photo">
      <img src="chowki.jpg" alt="ಚೌಕಿ">
    </div>
  </section>

  <!-- ✨ Single Back & Continue Button Section -->
  <div style="text-align:center; margin-top: 40px;">
    <button onclick="window.location.href='about.html'"
      style="padding: 12px 30px; font-size: 1em; color: gold; background: transparent;
             border: 2px solid gold; border-radius: 25px; cursor: pointer; transition: 0.3s;
             box-shadow: 0 0 20px rgba(255,215,0,0.3); margin: 10px;">
      ⬅ Back
    </button>

    <button onclick="window.location.href='events.html'"
      style="padding: 12px 30px; font-size: 1em; color: gold; background: transparent;
             border: 2px solid gold; border-radius: 25px; cursor: pointer; transition: 0.3s;
             box-shadow: 0 0 20px rgba(255,215,0,0.3); margin: 10px;">
      Continue ➡
    </button>
  </div>

  <script>
   const buttons = document.querySelectorAll('button');
buttons.forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    btn.style.background = 'gold';
    btn.style.color = '#3b0000';
    btn.style.boxShadow = '0 0 30px gold';
  });
  btn.addEventListener('mouseleave', () => {
    btn.style.background = 'transparent';
    btn.style.color = 'gold';
    btn.style.boxShadow = '0 0 20px rgba(255,215,0,0.3)';
  });
});

  </script>

  <footer> © 2025 ಯಕ್ಷ ದೇದಿಪ್ಯ | VAISHNAVI HAIKADY</a> <br>
    <span>Powered by Smart Creations Education Trust ®</span>

  </footer>

</body>
</html>
