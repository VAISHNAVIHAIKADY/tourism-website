<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ವಿಷಯ ಪಟ್ಟಿ | Yaksha Dedeepya</title>
  <link rel="icon" href="logo123.jpeg" type="image/jpeg">
  <style>
    /* ------------------------------------------
       Yaksha Dedeepya – ವಿಷಯ ಪಟ್ಟಿ (Content Menu)
       Handcrafted for desktop & phone screens
       ------------------------------------------ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: radial-gradient(circle at 25% top, #1a0000, #3b0000 80%, #000);
      color: #FFD700;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow-x: hidden;
      position: relative;
      padding: 15px;
    }

    /* ✨ Floating light points */
    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: -1;
    }

    .stars span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: gold;
      opacity: 0.9;
      border-radius: 50%;
      animation: floatStar 8s linear infinite;
      filter: drop-shadow(0 0 2px gold);
    }

    @keyframes floatStar {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(100vh) scale(0.7); opacity: 0; }
    }

    h1 {
      font-size: 2.4em;
      text-shadow: 0 0 20px gold, 0 0 35px orange;
      letter-spacing: 1px;
      margin-bottom: 30px;
      line-height: 1.3;
    }

    /* 📜 Menu section */
    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-bottom: 50px;
      width: 100%;
      max-width: 400px;
    }

    .menu a {
      width: 90%;
      text-decoration: none;
      color: gold;
      font-size: 1.2em;
      border: 1.5px solid gold;
      border-radius: 30px;
      padding: 12px 25px;
      background: rgba(255,215,0,0.06);
      box-shadow: 0 0 12px rgba(255,215,0,0.25);
      transition: all 0.3s ease;
    }

    .menu a:hover {
      background: gold;
      color: #3b0000;
      box-shadow: 0 0 25px gold, 0 0 35px orange;
      transform: translateY(-2px);
    }

    /* 🔘 Navigation buttons */
    .nav-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 60px;
    }

    .nav-buttons button {
      flex: 1;
      min-width: 130px;
      padding: 10px 25px;
      font-size: 1em;
      color: gold;
      background: transparent;
      border: 1.5px solid gold;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 0 10px rgba(255,215,0,0.3);
    }

    .nav-buttons button:hover {
      background: gold;
      color: #3b0000;
      box-shadow: 0 0 20px gold;
      transform: scale(1.03);
    }

    /* 📱 Responsive adjustments */
    @media (max-width: 480px) {
      h1 {
        font-size: 1.9em;
        margin-bottom: 25px;
      }
      .menu a {
        font-size: 1.05em;
        padding: 10px 20px;
      }
      .nav-buttons button {
        font-size: 0.95em;
        padding: 9px 18px;
      }
      footer {
        font-size: 0.8em;
        padding: 10px 5px;
      }
    }

    footer {
      position: relative;
      bottom: 0;
      width: 100%;
      text-align: center;
      font-size: 0.9em;
      color: #FFD700;
      text-shadow: 0 0 6px gold;
      background: rgba(0,0,0,0.1);
      padding: 10px;
      letter-spacing: 0.3px;
      border-top: 1px solid rgba(255,215,0,0.3);
    }

    footer span {
      display: block;
      font-size: 0.8em;
      margin-top: 3px;
      color: rgba(255,215,0,0.85);
    }
  </style>
</head>
<body>

  <!-- Floating golden dots -->
  <div class="stars" id="stars"></div>

  <h1>ವಿಷಯ ಪಟ್ಟಿ</h1>

  <div class="menu">
    <a href="sabhalakshana.html">ಸಭಾ ಲಕ್ಷಣ</a>
    <a href="prasanga1.html">ಅರಗಿನ ಮನೆ</a>
    <a href="prasanga2.html">ಚಕ್ರವ್ಯೂಹ</a>
    <a href="prasanga3.html">ಮಥುರಾ ಮಹೀಂದ್ರ</a>
    <a href="prasanga4.html">ಕನಸ ಕಂಡ ಕಂಸ</a>
    <a href="prasanga5.html">ಶ್ಯಮಂತಕ ರತ್ನ</a>
  </div>

  <div class="nav-buttons">
    <button onclick="window.location.href='contact.html'">⬅ ಹಿಂದಕ್ಕೆ</button>
    <button onclick="window.location.href='index.html'">ಮುಖ್ಯ ಪುಟ</button>
  </div>

   <footer> © 2025 ಯಕ್ಷ ದೇದಿಪ್ಯ | VAISHNAVI HAIKADY</a> <br>
    <span>Powered by Smart Creations Education Trust ®</span></footer>


  <script>
    // Soft floating particles for stage-light effect
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 65; i++) {
      const star = document.createElement('span');
      star.style.left = Math.random() * 100 + 'vw';
      star.style.top = Math.random() * -100 + 'vh';
      star.style.animationDelay = Math.random() * 8 + 's';
      star.style.opacity = (Math.random() * 0.8 + 0.2).toFixed(2);
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
