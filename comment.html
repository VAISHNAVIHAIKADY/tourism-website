<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ಪ್ರತಿಕ್ರಿಯೆ / Comment | Yaksha Dedeepya</title>

  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
    body {
      background: radial-gradient(circle at top, #000, #3b0000);
      color:#FFD700;
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center;
      padding:40px 20px; overflow-y:auto; position:relative;
    }
    .stars{position:absolute;width:100%;height:100%;top:0;left:0;overflow:hidden;z-index:-1;}
    .stars span{position:absolute;width:2px;height:2px;background:gold;animation:starMove 6s linear infinite;}
    @keyframes starMove{from{transform:translateY(0)scale(1);opacity:1;}to{transform:translateY(100vh)scale(0);opacity:0;}}

    h1{text-align:center;font-size:2.5em;text-shadow:0 0 25px gold,0 0 45px orange;margin-bottom:25px;}
    form{
      background:rgba(255,215,0,0.05);
      border:1px solid gold;border-radius:15px;padding:30px;max-width:600px;width:100%;
      box-shadow:0 0 25px rgba(255,215,0,0.2);
      display:flex;flex-direction:column;gap:20px;
    }
    label{font-size:1.1em;}
    input, textarea{
      padding:12px 15px;border-radius:8px;border:1px solid gold;background:transparent;color:#FFD700;
      font-size:1em;outline:none;transition:0.3s;
    }
    input:focus, textarea:focus{box-shadow:0 0 15px gold;}
    button{
      padding:12px 30px;font-size:1em;color:gold;background:transparent;border:2px solid gold;border-radius:25px;
      cursor:pointer;transition:0.3s;align-self:center;
    }
    button:hover{background:gold;color:#3b0000;box-shadow:0 0 25px gold;}
    .status{text-align:center;margin-top:10px;color:#FFD700;font-size:1em;}
    footer{text-align:center;margin-top:50px;color:#FFD700;font-size:0.9em;}
    .continue-btn{
      text-align:center;
      margin-top:25px;
      display:none; /* Hidden initially */
    }
    .continue-btn button{
      margin-top:10px;
      padding:12px 30px;
      font-size:1em;
      color:gold;
      background:transparent;
      border:2px solid gold;
      border-radius:25px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 15px rgba(255,215,0,0.3);
    }
    .continue-btn button:hover{
      background:gold;
      color:#3b0000;
      box-shadow:0 0 25px gold;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <h1>ನಿಮ್ಮ ಪ್ರತಿಕ್ರಿಯೆ</h1>

  <form id="commentForm">
    <label>ಹೆಸರು / Name:</label>
    <input type="text" id="name" required />

    <label>ಇಮೇಲ್ / Email:</label>
    <input type="email" id="email" required />

    <label>ಸಂದೇಶ / Message:</label>
    <textarea id="message" rows="5" required></textarea>

    <button type="submit">ಸಲ್ಲಿಸಿ / Submit</button>
  </form>

  <div id="statusMsg" class="status"></div>

  <!-- 🌟 Hidden Continue Button (shows only after submit) -->
  <div class="continue-btn" id="continueBtn">
    <button onclick="window.location.href='contact.html'">➡Continue</button>
  </div>

  <footer>© 2025 ಯಕ್ಷ ದೇದಿಪ್ಯ | VAISHNAVI HAIKADY <br> Powered by Smart Creations Education Trust ®</footer>

  <script>
    // Floating stars background
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('span');
      star.style.left = Math.random() * 100 + 'vw';
      star.style.top = Math.random() * -100 + 'vh';
      star.style.animationDelay = Math.random() * 5 + 's';
      starsContainer.appendChild(star);
    }
  </script>

  <!-- ✨ Firebase Setup -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7V2M4yIpGrHUoBk7dQWDON0PqwuDqXuQ",
      authDomain: "dondi-belakina-yakshagana.firebaseapp.com",
      projectId: "dondi-belakina-yakshagana",
      storageBucket: "dondi-belakina-yakshagana.firebasestorage.app",
      messagingSenderId: "111860501983",
      appId: "1:111860501983:web:e9bc7a4ebff710cf06886a",
      measurementId: "G-Z2NL0GR5B2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const statusMsg = document.getElementById('statusMsg');
    const continueBtn = document.getElementById('continueBtn');

    // Save comments to Firestore
    document.getElementById("commentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      try {
        await addDoc(collection(db, "comments"), {
          name,
          email,
          message,
          createdAt: serverTimestamp()
        });
        statusMsg.textContent = `ಧನ್ಯವಾದಗಳು ${name}! ನಿಮ್ಮ ಪ್ರತಿಕ್ರಿಯೆ ಯಶಸ್ವಿಯಾಗಿ ಉಳಿಸಲಾಗಿದೆ.`;
        statusMsg.style.color = "#aaffaa";
        document.getElementById("commentForm").reset();

        // ✅ Show continue button after submit
        continueBtn.style.display = "block";

      } catch (err) {
        statusMsg.textContent = "Error: " + err.message;
        statusMsg.style.color = "red";
      }
    });
  </script>
</body>
</html>
